<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>בדיקת שרת</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 20px; background: #f5f3f7; }
  h1 { font-size: 20px; }
  button { width: 100%; padding: 16px; font-size: 17px; font-weight: 700; color: #fff; background: #7C3AED; border: none; border-radius: 16px; margin: 8px 0; }
  pre { background: #fff; padding: 14px; border-radius: 12px; white-space: pre-wrap; word-break: break-word; font-size: 14px; border: 1px solid #ddd; min-height: 40px; }
  .ok { color: #047857; font-weight: 700; }
  .err { color: #dc2626; font-weight: 700; }
</style>
</head>
<body>
<h1>🔧 בדיקת שרת ההתראות</h1>
<p>לחץ על הכפתור כדי לבדוק אם האפליקציה מצליחה לשלוח תזכורת לשרת.</p>
<button onclick="testSchedule()">בדוק שליחת תזכורת לשרת</button>
<button onclick="testHealth()">בדוק שהשרת חי</button>
<pre id="out">התוצאה תופיע כאן...</pre>

<script>
const WORKER_URL = "https://journal-notifier.asafkiri.workers.dev";
const out = document.getElementById("out");

function show(msg, cls) {
  out.innerHTML = cls ? '<span class="' + cls + '">' + msg + '</span>' : msg;
}

async function testHealth() {
  show("בודק...", "");
  try {
    const r = await fetch(WORKER_URL + "/health");
    const t = await r.text();
    show("✅ השרת חי!\nתשובה: " + t + "\nסטטוס: " + r.status, "ok");
  } catch (e) {
    show("❌ שגיאה: " + e.message + "\n\nזו כנראה בעיית CORS.", "err");
  }
}

async function testSchedule() {
  show("שולח תזכורת בדיקה לשרת...", "");
  const fireAt = Date.now() + 120000; // 2 דקות מעכשיו
  try {
    const r = await fetch(WORKER_URL + "/schedule", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: "test-" + Date.now(), topic: "TEST", message: "בדיקה", fireAt: fireAt, title: "בדיקה" }),
    });
    const t = await r.text();
    show("✅ הצליח! השרת קיבל את התזכורת.\nתשובה: " + t + "\nסטטוס: " + r.status + "\n\nעכשיו ה-Write צריך לעלות ל-1.", "ok");
  } catch (e) {
    show("❌ נכשל! השגיאה:\n" + e.message + "\n\nזו בעיית CORS — השרת לא מאשר לאפליקציה לשלוח אליו.", "err");
  }
}
</script>
</body>
</html>
