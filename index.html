function fmtHMS(ms) {
  if (ms < 0) ms = 0;
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000), s = Math.floor((ms % 60000) / 1000);
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function calcStreak(dates) {
  const set = new Set(dates || []);
  let n = 0; const d = new Date();
  if (!set.has(isoOf(d))) d.setDate(d.getDate() - 1);
  while (set.has(isoOf(d))) { n++; d.setDate(d.getDate() - 1); }
  return n;
}

function wxInfo(code) {

async function loadWeather(city) {

let _webpOK = null;
function supportsWebp() {
  if (_webpOK !== null) return _webpOK;
  try { const c = document.createElement("canvas"); c.width = c.height = 1; _webpOK = c.toDataURL("image/webp").indexOf("data:image/webp") === 0; }
  catch { _webpOK = false; }
  return _webpOK;
}
function approxBytes(durl) { const i = durl.indexOf(","); return Math.ceil((durl.length - i - 1) * 0.75); }

/* Compresses an image as small as possible while keeping it viewable on a phone.
   Applies EXIF orientation first (via createImageBitmap) so front-camera selfies
   aren't saved mirrored and rotated shots stay upright. Prefers WebP (much
   smaller), falls back to JPEG. Shrinks quality first, then dimensions, until the
   result fits the byte budget (default ~90KB). */
function fileToDataURL(file, opts = {}) {
  const maxDim = opts.maxDim || 1000;
  const budget = opts.budgetBytes || 90 * 1024;
  const compress = (src, sw, sh) => {
    const type = supportsWebp() ? "image/webp" : "image/jpeg";
    const render = (dim, q) => {
      const scale = Math.min(1, dim / Math.max(sw, sh));
      const w = Math.max(1, Math.round(sw * scale));
      const h = Math.max(1, Math.round(sh * scale));
      const cv = document.createElement("canvas");
      cv.width = w; cv.height = h;
      cv.getContext("2d").drawImage(src, 0, 0, w, h);
      return cv.toDataURL(type, q);
    };
    let best = render(maxDim, 0.7);
    for (const q of [0.7, 0.6, 0.5, 0.42, 0.35]) {
      best = render(maxDim, q);
      if (approxBytes(best) <= budget) return best;
    }
    for (const d of [520, 460, 400, 340, 280]) {
      best = render(d, 0.42);
      if (approxBytes(best) <= budget) return best;
    }
    return best;
  };
  return new Promise((resolve, reject) => {
    // Fallback for browsers without createImageBitmap: decode via <img>. Keeps
    // photo upload working everywhere (may not correct front-camera mirroring).
    const useImg = () => {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = (e) => {
        const img = new Image();
        img.onerror = reject;
        img.onload = () => { try { resolve(compress(img, img.width, img.height)); } catch { resolve(e.target.result); } };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };
    // Preferred: bakes EXIF orientation (incl. front-camera mirroring) into the
    // pixels before we draw, so nothing comes out flipped.
    if (typeof createImageBitmap === "function") {
      let p;
      try { p = createImageBitmap(file, { imageOrientation: "from-image" }); }
      catch (e) { useImg(); return; }
      p.then((bmp) => {
        try { const out = compress(bmp, bmp.width, bmp.height); if (bmp.close) bmp.close(); resolve(out); }
        catch (e) { if (bmp && bmp.close) bmp.close(); useImg(); }
      }).catch(() => useImg());
    } else {
      useImg();
    }
  });
}

function translateAuthError(e) {
  const c = (e && e.code) || "";
  if (c.includes("invalid-email")) return "כתובת אימייל לא תקינה";
  if (c.includes("missing-password")) return "חסרה סיסמה";
  if (c.includes("weak-password")) return "הסיסמה צריכה להיות לפחות 6 תווים";
  if (c.includes("email-already-in-use")) return "המייל כבר רשום — נסו להתחבר במקום";
  if (c.includes("invalid-credential") || c.includes("wrong-password") || c.includes("user-not-found")) return "אימייל או סיסמה שגויים";
  if (c.includes("too-many-requests")) return "יותר מדי ניסיונות, נסו שוב מאוחר יותר";
  if (c.includes("network")) return "אין חיבור לאינטרנט";
  return "שגיאה: " + ((e && e.message) || c || "לא ידוע");
}

const CHAT_TTL_MS = 7 * 24 * 60 * 60 * 1000;
const CHAT_MAX_MESSAGES = 200;
function cleanChatMessages(messages, nowMs = Date.now()) {
  const cutoff = nowMs - CHAT_TTL_MS;
  return (Array.isArray(messages) ? messages : [])
    .filter((m) => m && typeof m.text === "string" && (Number(m.createdAt) || 0) >= cutoff)
    .map((m) => ({
      id: m.id || uid(),
      from: m.from === "b" ? "b" : "a",
      text: String(m.text || "").slice(0, 600),
      createdAt: Number(m.createdAt) || Date.now(),
    }))
    .sort((a, b) => a.createdAt - b.createdAt)
    .slice(-CHAT_MAX_MESSAGES);
}
function sameChatMessages(a, b) {
  const x = Array.isArray(a) ? a : [];
  const y = Array.isArray(b) ? b : [];
  if (x.length !== y.length) return false;
  for (let i = 0; i < x.length; i++) {
    if (x[i].id !== y[i].id || x[i].text !== y[i].text || x[i].from !== y[i].from || x[i].createdAt !== y[i].createdAt) return false;
  }
  return true;
}
// A sealed letter keeps its photo for a grace window AFTER it opens (so you both have
// time to see the reveal, even if one of you doesn't open the app daily); after that only
// the words remain in the keepsakes folder. Change this one number to tune the window.
const SEALED_PHOTO_GRACE_MS = 30 * 24 * 60 * 60 * 1000; // 30 days
// Drops expired timed letters entirely (text + photo) to keep the shared doc small.
// Keepsakes (incl. sealed letters) are never auto-removed — only manual delete removes them.
function cleanLetters(letters, nowMs = Date.now()) {
  return (Array.isArray(letters) ? letters : [])
    .filter((l) => {
      if (!l || typeof l.text !== "string") return false;
      if (l.keepsake) return true;
      const dur = Number(l.durationHours) || 24;
      return (Number(l.createdAt) || 0) + dur * 3600000 > nowMs;
    })
    .map((l) => (l && l.photo && l.openAt && nowMs > Number(l.openAt) + SEALED_PHOTO_GRACE_MS) ? { ...l, photo: null } : l);
}
// True when two letter lists match on what cleanLetters can change: which letters exist,
// and whether each still has a photo. Used to know when a cleanup needs to be saved.
function sameLetters(a, b) {
  const x = Array.isArray(a) ? a : [], y = Array.isArray(b) ? b : [];
  if (x.length !== y.length) return false;
  for (let i = 0; i < x.length; i++) {
    if (x[i].id !== y[i].id || !!x[i].photo !== !!y[i].photo) return false;
  }
  return true;
}

/* ---- letter photos live in couples/{cid}/photos/{letterId}, OUT of the main doc ----
   Keeps the couple doc small & fast (every save re-uploads the whole doc), and removes
   the 1MB ceiling. Each helper returns a promise; callers handle their own loading UI. */
async function savePhotoDoc(coupleId, letterId, dataUrl) {
  const fb = window.__fb;
  if (!fb || !coupleId || !letterId || !dataUrl) return false;
  await fb.setDoc(fb.doc(fb.db, "couples", coupleId, "photos", letterId), { photo: dataUrl, updatedAt: Date.now() });
  return true;
}
async function loadPhotoDoc(coupleId, letterId) {
  const fb = window.__fb;
  if (!fb || !coupleId || !letterId) return null;
  try {
    const snap = await fb.getDoc(fb.doc(fb.db, "couples", coupleId, "photos", letterId));
    return snap && snap.exists() ? (snap.data().photo || null) : null;
  } catch (e) { return null; }
}
async function deletePhotoDoc(coupleId, letterId) {
  const fb = window.__fb;
  if (!fb || !coupleId || !letterId) return false;
  try { await fb.deleteDoc(fb.doc(fb.db, "couples", coupleId, "photos", letterId)); return true; }
  catch (e) { return false; }
}

/* ============================ seed + normalize ============================ */
function buildSeed() {
  return {
    names: { a: "", b: "" },
    theme: "sunset",
    longDistance: false,
    people: { a: { city: "" }, b: { city: "" } },
    anniversary: null,
    moods: { a: { date: "", emoji: "" }, b: { date: "", emoji: "" } },
    activityDates: [],
    features: { countdowns: true, keepsakes: true, dreams: true, watchlist: true, reminders: true, roulette: true, dailyQ: true, onThisDay: true },
    ntfyOn: false,
    ntfyTopic: "",
    dailyAnswers: {},
    chatMessages: [],
    roulette: ["מי בוחר סרט 🎬", "מי מכין ארוחה 🍳", "נשיקה 💋", "חיבוק גדול 🤗", "מי שוטף כלים 🧽", "10 דק׳ עיסוי 💆"],
    countdowns: [],
    letters: [],
    reminders: [],
    events: [],
    dreams: [],
    watchlist: [],
  };
}

function normalize(d) {
  const s = buildSeed();
  if (!d || typeof d !== "object") return s;
  const out = { ...s, ...d };
  out.names = { ...s.names, ...(d.names || {}) };
  out.people = { a: { ...(d.people && d.people.a) }, b: { ...(d.people && d.people.b) } };
  out.moods = d.moods || s.moods;
  out.reminders = d.reminders || [];
  out.dreams = d.dreams || [];
  out.watchlist = d.watchlist || [];
  out.events = d.events || [];
  out.letters = (d.letters || []).map((l) => ({ reaction: null, ...l }));
  out.activityDates = d.activityDates || [];
  out.theme = THEMES[d.theme] ? d.theme : "sunset";
  out.longDistance = !!d.longDistance;
  out.features = { ...s.features, ...(d.features || {}) };
  out.ntfyOn = !!d.ntfyOn;
  out.ntfyTopic = d.ntfyTopic || "";
  out.roulette = Array.isArray(d.roulette) ? d.roulette : s.roulette;
  out.dailyAnswers = (d.dailyAnswers && typeof d.dailyAnswers === "object") ? d.dailyAnswers : {};
  out.chatMessages = cleanChatMessages(d.chatMessages || []);
  if (!d.countdowns) out.countdowns = d.countdown ? [{ id: uid(), ...d.countdown }] : s.countdowns;
  else out.countdowns = d.countdowns;
  return out;
}

function sendNtfy(topic, message) {
  if (!topic) return;
  try {
    fetch("https://ntfy.sh", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ topic: topic, title: "היומן שלנו ❤️", message: message || "", tags: ["love_letter"] }),
    }).catch(function () {});
  } catch (e) {}
}

function scheduleNtfy(topic, fireAtMs, message) {
  if (!topic) return;
  try {
    fetch("https://ntfy.sh", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ topic: topic, title: "היומן שלנו ❤️", message: message || "", tags: ["bell"], delay: String(Math.round(fireAtMs / 1000)) }),
    }).catch(function () {});
  } catch (e) {}
}

function LetterViewer({ letter, names, now, coupleId, onReact, onKeepsake, onDelete, onClose }) {
  const accent = letter.from === "b" ? "#EC4899" : "#3B82F6";
  const remaining = letter.createdAt + letter.durationHours * 3600000 - now;
  const cardRef = useRef(null);
  const [saving, setSaving] = useState(false);
  const [imgPreview, setImgPreview] = useState(null);
  const [photoData, setPhotoData] = useState(letter.photo || null);
  const [photoLoading, setPhotoLoading] = useState(false);
  // old letters carry the photo inline; new ones live in couples/{cid}/photos/{id}.
  // skip loading while still sealed, so a locked letter never fetches its image.
  useEffect(() => {
    let alive = true;
    if (letter.photo) { setPhotoData(letter.photo); return; }
    setPhotoData(null);
    if (letter.hasPhoto && coupleId && !(letter.openAt && letter.openAt > Date.now())) {
      setPhotoLoading(true);
      loadPhotoDoc(coupleId, letter.id).then((p) => { if (alive) { setPhotoData(p); setPhotoLoading(false); } });
    }
    return () => { alive = false; };
  }, [letter.id, letter.photo, letter.hasPhoto, coupleId]);
  const dateStr = new Date(letter.createdAt).toLocaleDateString("he-IL", { day: "2-digit", month: "long", year: "numeric" });
  async function saveImage() {
    if (saving || !window.html2canvas || !cardRef.current) return;
    setSaving(true);
    try {
      const canvas = await window.html2canvas(cardRef.current, { scale: 2, backgroundColor: null, useCORS: true, logging: false });
      const dataUrl = canvas.toDataURL("image/png");
      const fname = "letter-" + new Date(letter.createdAt).toISOString().slice(0, 10) + ".png";
      const blob = await new Promise((res) => canvas.toBlob(res, "image/png"));
      if (blob && navigator.canShare) {
        const file = new File([blob], fname, { type: "image/png" });
        if (navigator.canShare({ files: [file] })) {
          try { await navigator.share({ files: [file], title: "מכתב 💌" }); setSaving(false); return; }
          catch (e) { if (e && e.name === "AbortError") { setSaving(false); return; } }
        }
      }
      setImgPreview(dataUrl);
    } catch (e) { console.error("save image failed", e); }
    finally { setSaving(false); }
  }
  const locked = letter.openAt && letter.openAt > now;
  if (locked) return (
    <Modal onClose={onClose} accent="#7C3AED">
      <div className="p-6 text-center">
        <div style={{ fontSize: 44, marginBottom: 10 }}>🔒</div>
        <div className="font-extrabold mb-1" style={{ fontSize: 18, color: C.ink }}>מכתב חתום מ{names[letter.from]}</div>
        <div style={{ fontSize: 14, color: C.muted, lineHeight: 1.6 }}>המכתב נעול וייפתח אוטומטית ב:</div>
        <div className="font-extrabold mb-5" style={{ fontSize: 17, color: "#7C3AED" }}>{new Date(letter.openAt).toLocaleDateString("he-IL", { day: "2-digit", month: "long", year: "numeric" })}</div>
        <button onClick={onClose} className="w-full rounded-3xl py-3.5 text-white font-extrabold transition active:scale-95 mb-2" style={{ fontSize: 15, background: "linear-gradient(95deg,#7C3AED,#EC4899)" }}>סגירה</button>
        <button onClick={onDelete} className="w-full rounded-2xl py-2.5 font-bold transition active:scale-95" style={{ fontSize: 13, background: "transparent", color: "#EF4444" }}>מחיקת המכתב החתום</button>
      </div>
    </Modal>
  );
  return (
    <Modal onClose={onClose} accent={accent}>
      <div className="p-5">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2"><Heart style={{ width: 22, height: 22, fill: accent, color: accent }} /><span style={{ fontFamily: SCRIPT, fontSize: 24, color: C.ink }}>מאת: {names[letter.from]}</span></div>
          <RoundBtn onClick={onClose} className="w-9 h-9" style={closeBtnStyle}><X style={{ width: 16, height: 16, color: C.muted }} /></RoundBtn>
        </div>
        {photoLoading && <div className="w-full rounded-2xl mb-4 grid place-items-center" style={{ height: 180, background: "#F6EEF2", color: C.muted, fontSize: 13 }}>טוען תמונה…</div>}
        {photoData && <img src={photoData} alt="" className="w-full rounded-2xl object-cover mb-4" style={{ maxHeight: 360 }} />}
        <p className="whitespace-pre-wrap mb-4" style={{ fontSize: 16.5, color: C.ink, lineHeight: 1.75 }}>{letter.text}</p>
        <div className="flex items-center justify-center gap-1.5 mb-4" style={{ fontSize: 12.5, color: C.muted }}>
          <Calendar style={{ width: 14, height: 14 }} /><span style={{ fontFamily: SCRIPT, fontSize: 14 }}>נוצר ביומן הזוגי של {names.a} ו{names.b} ❤️</span>
        </div>
        <div className="flex items-center justify-center gap-1.5 mb-4">
          {REACTIONS.map((e) => (<button key={e} onClick={() => onReact(e)} className="rounded-full transition active:scale-90"
            style={{ fontSize: 20, width: 38, height: 38, background: letter.reaction === e ? `${accent}22` : C.soft, border: letter.reaction === e ? `1.5px solid ${accent}` : "1.5px solid transparent" }}>{e}</button>))}
        </div>
        <button onClick={saveImage} disabled={saving} className="w-full flex items-center justify-center gap-2 rounded-2xl py-3.5 font-bold transition active:scale-95 disabled:opacity-50 mb-3" style={{ fontSize: 14.5, background: `${accent}14`, color: accent, border: `1.5px solid ${accent}33` }}>
          <ImageIcon style={{ width: 18, height: 18 }} />{saving ? "מכין תמונה…" : "שמירת המכתב כתמונה לגלריה"}
        </button>
        <div className="flex items-center justify-between gap-2">
          <RoundBtn onClick={onDelete} className="w-11 h-11" style={{ background: "#FDECEC" }}><Trash2 style={{ width: 20, height: 20, color: "#EF4444" }} /></RoundBtn>
          <button onClick={onKeepsake} disabled={letter.keepsake} className="flex items-center gap-2 rounded-2xl px-4 py-3 font-bold transition active:scale-95"
            style={letter.keepsake ? { fontSize: 14, background: "#EAF7EE", color: "#16A34A" } : { fontSize: 14, background: "#EAF1FF", color: "#2563EB" }}>
            {letter.keepsake ? <Check style={{ width: 16, height: 16 }} /> : <Camera style={{ width: 16, height: 16 }} />}{letter.keepsake ? "נשמר כמזכרת" : "שמור כמזכרת"}
          </button>
          <div className="flex items-center gap-1.5 rounded-2xl px-3 py-2.5" style={{ background: "#F6EEF2" }}>
            <Clock style={{ width: 16, height: 16, color: C.muted }} /><span className="font-bold tabular-nums" style={{ fontSize: 12.5, color: letter.keepsake ? "#16A34A" : C.ink }}>{letter.keepsake ? "לתמיד" : `נותרו: ${fmtHMS(remaining)}`}</span>
          </div>
        </div>
      </div>

      {/* hidden card rendered to an image when saving */}
      <div ref={cardRef} dir="rtl" aria-hidden="true" style={{ position: "fixed", left: -99999, top: 0, width: 380, fontFamily: BODY, padding: 22, background: "linear-gradient(160deg,#FFE3D3 0%,#FBD7E4 100%)" }}>
        <div style={{ background: "#fff", borderRadius: 26, padding: 26, borderTop: `6px solid ${accent}`, boxShadow: "0 18px 40px -20px rgba(150,40,80,.5)" }}>
          <div style={{ textAlign: "center", fontFamily: SCRIPT, fontSize: 30, color: accent, lineHeight: 1.1 }}>מאת {names[letter.from]} 💌</div>
          <div style={{ textAlign: "center", fontSize: 13, color: C.muted, marginTop: 4, marginBottom: 18 }}>{dateStr}</div>
          {photoData && <img src={photoData} alt="" style={{ width: "100%", borderRadius: 18, marginBottom: 18, display: "block" }} />}
          <div style={{ whiteSpace: "pre-wrap", fontSize: 18, color: C.ink, lineHeight: 1.8, textAlign: "center" }}>{letter.text}</div>
          {letter.reaction && <div style={{ textAlign: "center", fontSize: 30, marginTop: 16 }}>{letter.reaction}</div>}
          <div style={{ textAlign: "center", marginTop: 22, paddingTop: 16, borderTop: `1px solid ${C.line}`, fontFamily: SCRIPT, fontSize: 17, color: "#C58AA0" }}>היומן של {names.a} ו{names.b} ❤️</div>
        </div>
      </div>

      {imgPreview && (
        <div className="fixed inset-0 flex flex-col items-center justify-center p-4" dir="rtl"
          style={{ background: "rgba(20,10,15,.85)", backdropFilter: "blur(6px)", zIndex: 9999 }}
          onClick={() => setImgPreview(null)}>
          <div className="rounded-2xl px-4 py-2 mb-3 text-center font-bold" onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 14, color: "#fff", background: "rgba(255,255,255,.14)", lineHeight: 1.5 }}>
            לשמירה לגלריה: לחיצה ארוכה על התמונה ← בחרו <span style={{ whiteSpace: "nowrap" }}>"שמור תמונה" 📸</span>
          </div>
          <img src={imgPreview} alt="מכתב" onClick={(e) => e.stopPropagation()}
            style={{ maxWidth: "100%", maxHeight: "66vh", borderRadius: 18, boxShadow: "0 20px 50px -20px rgba(0,0,0,.6)" }} />
          <div className="flex gap-2 mt-4" onClick={(e) => e.stopPropagation()}>
            <a href={imgPreview} download="love-letter.png" className="rounded-full px-5 py-2.5 font-bold transition active:scale-95" style={{ fontSize: 13.5, background: "#fff", color: C.ink }}>הורדה למחשב</a>
            <button onClick={() => setImgPreview(null)} className="rounded-full px-5 py-2.5 font-bold transition active:scale-95" style={{ fontSize: 13.5, background: "rgba(255,255,255,.18)", color: "#fff" }}>סגירה</button>
          </div>
        </div>
      )}
    </Modal>
  );
}

function LongDistanceCard({ people, names, now }) {
  const [info, setInfo] = useState({ a: null, b: null });
  const cacheRef = useRef({});
  useEffect(() => {
    let off = false;
    ["a", "b"].forEach(async (p) => {
      const city = people && people[p] && people[p].city && people[p].city.trim();
      if (!city) { setInfo((s) => ({ ...s, [p]: null })); return; }
      if (cacheRef.current[city]) { setInfo((s) => ({ ...s, [p]: cacheRef.current[city] })); return; }
      try { const w = await loadWeather(city); if (w) { cacheRef.current[city] = w; if (!off) setInfo((s) => ({ ...s, [p]: w })); } } catch {}
    });
    return () => { off = true; };
  }, [people && people.a && people.a.city, people && people.b && people.b.city]);
  const half = (p) => {
    const c = p === "b" ? "#EC4899" : "#3B82F6"; const w = info[p];
    const time = w && w.tz ? new Date(now).toLocaleTimeString("he-IL", { timeZone: w.tz, hour: "2-digit", minute: "2-digit" }) : "—";
    const wx = w && w.code != null ? wxInfo(w.code) : null;
    return (
      <div className="flex-1 flex flex-col items-center gap-0.5 py-1">
        <div className="flex items-center gap-1.5">
          <span className="rounded-full grid place-items-center" style={{ width: 18, height: 18, background: c }}><Heart style={{ width: 10, height: 10, fill: "#fff", color: "#fff" }} /></span>
          <span className="font-bold" style={{ fontSize: 13, color: C.ink }}>{names[p]}</span>
        </div>
        <div className="font-black tabular-nums" style={{ fontSize: 26, color: C.ink }}>{time}</div>
        <div style={{ fontSize: 12, color: C.muted }}>{w ? `${w.name}${wx ? ` · ${wx[0]} ${w.temp}°` : ""}` : (people && people[p] && people[p].city ? "טוען…" : "לא הוגדרה עיר")}</div>
      </div>
    );
  };
  return (
    <Card className="fade-up p-3" style={{ animationDelay: ".15s" }}>
      <div className="flex items-center justify-center gap-1.5 mb-1"><Globe style={{ width: 16, height: 16, color: "#3B82F6" }} /><span className="font-extrabold" style={{ fontSize: 13, color: C.muted }}>גם כשרחוקים, אותו שמיים</span></div>
      <div className="flex items-stretch">{half("a")}<div style={{ width: 1, background: C.line, margin: "6px 4px" }} />{half("b")}</div>
    </Card>
  );
}

const ROULETTE_COLORS = ["#F472B6", "#A855F7", "#60A5FA", "#34D399", "#FBBF24", "#FB7185", "#818CF8", "#F59E0B"];
function RouletteCard({ options, onAdd, onDelete }) {
  const [rot, setRot] = useState(0);
  const [spinning, setSpinning] = useState(false);
  const [result, setResult] = useState(null);
  const [edit, setEdit] = useState(false);
  const [txt, setTxt] = useState("");
  const n = options.length;
  const seg = n > 0 ? 360 / n : 360;
  const grad = n > 0 ? "conic-gradient(" + options.map((_, i) => `${ROULETTE_COLORS[i % ROULETTE_COLORS.length]} ${i * seg}deg ${(i + 1) * seg}deg`).join(",") + ")" : "#eee";
  function spin() {
    if (spinning || n < 2) return;
    setResult(null);
    const extra = 360 * 5 + Math.floor(Math.random() * 360);
    const next = rot + extra;
    setSpinning(true);
    setRot(next);
    const finalDeg = ((next % 360) + 360) % 360;
    const atTop = (360 - finalDeg) % 360;
    const idx = Math.floor(atTop / seg) % n;
    setTimeout(() => { setResult(options[idx]); setSpinning(false); }, 4200);
  }
  return (
    <Card className="fade-up p-4" style={{ animationDelay: ".18s" }}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-1.5"><span style={{ fontSize: 18 }}>🎡</span><span className="font-extrabold" style={{ fontSize: 15, color: C.ink }}>רולטה</span></div>
        <button onClick={() => setEdit((v) => !v)} className="rounded-full px-3 py-1 font-bold transition active:scale-95" style={{ fontSize: 12, background: "#F6EEF2", color: "#7C3AED" }}>{edit ? "סיום" : "✏️ ערוך"}</button>
      </div>

      {edit ? (
        <div className="mb-1">
          <div className="flex gap-2 mb-3">
            <input value={txt} onChange={(e) => setTxt(e.target.value)} placeholder="אפשרות חדשה לרולטה…" className={inputCls} style={{ ...inputStyle, fontSize: 14 }} onKeyDown={(e) => { if (e.key === "Enter" && txt.trim()) { onAdd(txt.trim()); setTxt(""); } }} />
            <button onClick={() => { if (txt.trim()) { onAdd(txt.trim()); setTxt(""); } }} className="shrink-0 rounded-2xl px-4 font-extrabold text-white" style={{ fontSize: 20, background: "linear-gradient(135deg,#A855F7,#EC4899)" }}>+</button>
          </div>
          <div className="space-y-2">
            {options.map((o, i) => (
              <div key={i} className="flex items-center gap-2 rounded-2xl px-3 py-2" style={{ background: C.soft }}>
                <span className="rounded-full shrink-0" style={{ width: 12, height: 12, background: ROULETTE_COLORS[i % ROULETTE_COLORS.length] }} />
                <span className="flex-1 text-right font-bold" style={{ fontSize: 14, color: C.ink }}>{o}</span>
                <button onClick={() => onDelete(i)} className="shrink-0"><X style={{ width: 16, height: 16, color: "#E0719A" }} /></button>
              </div>
            ))}
            {n === 0 && <div className="text-center py-2" style={{ fontSize: 12.5, color: C.muted }}>הוסיפו אפשרויות לרולטה ✨</div>}
          </div>
        </div>
      ) : (
        <div className="flex flex-col items-center">
          <div style={{ position: "relative", width: 230, height: 230, marginBottom: 14 }}>
            <div style={{ position: "absolute", top: -4, left: "50%", transform: "translateX(-50%)", width: 0, height: 0, borderLeft: "11px solid transparent", borderRight: "11px solid transparent", borderTop: "20px solid #2B2533", zIndex: 3, filter: "drop-shadow(0 2px 2px rgba(0,0,0,.2))" }} />
            <div style={{ width: 230, height: 230, borderRadius: "50%", background: grad, border: "6px solid #fff", boxShadow: "0 10px 30px -8px rgba(150,40,80,.45)", transform: `rotate(${rot}deg)`, transition: spinning ? "transform 4s cubic-bezier(.17,.67,.3,1)" : "none", position: "relative" }}>
              {options.map((o, i) => {
                const mid = (i + 0.5) * seg;
                const r = (mid * Math.PI) / 180;
                const x = 115 + 68 * Math.sin(r);
                const y = 115 - 68 * Math.cos(r);
                return (
                  <div key={i} style={{ position: "absolute", left: x, top: y, width: 82, transform: `translate(-50%,-50%) rotate(${-rot}deg)`, transition: spinning ? "transform 4s cubic-bezier(.17,.67,.3,1)" : "none", textAlign: "center", pointerEvents: "none" }}>
                    <span style={{ display: "inline-block", color: "#fff", fontSize: 10, fontWeight: 800, lineHeight: 1.12, textShadow: "0 1px 2px rgba(0,0,0,.5)", wordBreak: "break-word", maxHeight: 36, overflow: "hidden" }}>{o}</span>
                  </div>
                );
              })}
            </div>
            <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", width: 34, height: 34, borderRadius: "50%", background: "#fff", boxShadow: "0 2px 6px rgba(0,0,0,.2)", zIndex: 2, display: "grid", placeItems: "center", fontSize: 16 }}>❤️</div>
          </div>
          {result && <div className="rounded-2xl px-4 py-2 mb-3 text-center font-extrabold fade-up" style={{ fontSize: 16, color: "#fff", background: "linear-gradient(95deg,#A855F7,#EC4899)" }}>{result}</div>}
          <button onClick={spin} disabled={spinning || n < 2} className="w-full rounded-3xl py-3.5 font-extrabold text-white transition active:scale-95 disabled:opacity-40" style={{ fontSize: 15, background: "linear-gradient(95deg,#7C3AED,#EC4899)" }}>
            {n < 2 ? "הוסיפו לפחות 2 אפשרויות" : spinning ? "מסתובב…" : "סובב! 🎡"}
          </button>
        </div>
      )}
    </Card>
  );
}

/* ============================ app ============================ */
function App() {
  const [fb, setFb] = useState(typeof window !== "undefined" ? (window.__fb || null) : null);
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [authBusy, setAuthBusy] = useState(false);
  const [authErr, setAuthErr] = useState("");
  const [fbError, setFbError] = useState(false);
  const [verified, setVerified] = useState(false);
  const [verifyBusy, setVerifyBusy] = useState(false);
  const [verifyMsg, setVerifyMsg] = useState("");

  const [data, setData] = useState(null);
  const [coupleId, setCoupleId] = useState(null);
  const [linkReady, setLinkReady] = useState(false);
  const [linkBusy, setLinkBusy] = useState(false);
  const [linkErr, setLinkErr] = useState("");
  const lastSavedRef = useRef("");
  const saveTimerRef = useRef(null);
  const [saveRetryTick, setSaveRetryTick] = useState(0);
  const [syncStatus, setSyncStatus] = useState("synced");
  const [syncText, setSyncText] = useState("מסונכרן");
  const seenLettersRef = useRef(null);
  const localLettersRef = useRef(new Set());


  const [now, setNow] = useState(Date.now());
  const [modal, setModal] = useState(null);
  const [cdTarget, setCdTarget] = useState(null);
  const [openLetter, setOpenLetter] = useState(null);
  const [moodPickerFor, setMoodPickerFor] = useState(null);
  const [open, setOpen] = useState({ dreams: false, keepsakes: false, reminders: false, watchlist: false });
  const [dreamTxt, setDreamTxt] = useState("");
  const [watchTxt, setWatchTxt] = useState("");
  const [thinkSent, setThinkSent] = useState(false);
  const [msgTxt, setMsgTxt] = useState("");
  const [msgSent, setMsgSent] = useState(false);
  const toggle = (k) => setOpen((o) => ({ ...o, [k]: !o[k] }));

  const td = new Date();
  const todayISO = isoOf(td);
  const [selectedDate, setSelectedDate] = useState(todayISO);
  const [cal, setCal] = useState({ y: td.getFullYear(), m: td.getMonth() });

  // tick clock
  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);

  // wait for firebase module to be ready
  useEffect(() => {
    if (fb) return;
    const onReady = () => setFb(window.__fb);
    window.addEventListener("fb-ready", onReady);
    if (window.__fb) setFb(window.__fb);
    const to = setTimeout(() => { if (!window.__fb) setFbError(true); }, 12000);
    return () => { window.removeEventListener("fb-ready", onReady); clearTimeout(to); };
  }, [fb]);

  // auth state
  useEffect(() => {
    if (!fb) return;
    const unsub = fb.onAuthStateChanged(fb.auth, (u) => { setUser(u); setVerified(!!(u && u.emailVerified)); setAuthReady(true); });
    return () => unsub();
  }, [fb]);

  // find which couple this user belongs to (reacts when they create/join)
  useEffect(() => {
    if (!fb || !user || !verified) { setCoupleId(null); setLinkReady(false); return; }
    const ref = fb.doc(fb.db, "users", user.uid);
    const unsub = fb.onSnapshot(ref, (snap) => {
      setCoupleId(snap.exists() && snap.data() ? (snap.data().coupleId || null) : null);
      setLinkReady(true);
    }, (err) => { console.error("mapping snapshot", err); setLinkReady(true); });
    return () => unsub();
  }, [fb, user, verified]);

  // live load the shared couple journal
  useEffect(() => {
    if (!fb || !user || !verified || !coupleId) { setData(null); return; }
    const ref = fb.doc(fb.db, "couples", coupleId);
    const unsub = fb.onSnapshot(ref, (snap) => {
      if (snap.exists() && snap.data()) {
        const raw = snap.data();
        const norm = normalize(raw);
        norm.a = raw.a || null;
        norm.b = raw.b || null;
        lastSavedRef.current = JSON.stringify(norm);
        setSyncStatus("synced");
        setSyncText("מסונכרן");
        setData(norm);
      }
    }, (err) => { console.error("couple snapshot error", err); setSyncStatus("error"); setSyncText("שגיאת סנכרון"); });
    return () => unsub();
  }, [fb, user, verified, coupleId]);

  // save journal (debounced; never overwrites membership a/b)
  useEffect(() => {
    if (!fb || !user || !data || !coupleId) return;
    const j = JSON.stringify(data);
    if (j === lastSavedRef.current) { setSyncStatus("synced"); setSyncText("מסונכרן"); return; }
    setSyncStatus("saving");
    setSyncText("שומר…");
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      const obj = JSON.parse(j); delete obj.a; delete obj.b;
      fb.setDoc(fb.doc(fb.db, "couples", coupleId), obj, { merge: true })
        .then(() => { lastSavedRef.current = j; setSyncStatus("synced"); setSyncText("נשמר"); })
        .catch((e) => { console.error("save failed", e); setSyncStatus("error"); setSyncText("שגיאת שמירה — לחצו לנסות שוב"); });
    }, 400);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [data, fb, user, coupleId, saveRetryTick]);

  // local safety backup only — does not write or restore anything by itself
  useEffect(() => {
    if (!data || !coupleId) return;
    try {
      const obj = JSON.parse(JSON.stringify(data)); delete obj.a; delete obj.b;
      window.localStorage.setItem("loveJournalAutoBackup:" + coupleId, JSON.stringify({ app: "love-journal", coupleId, backedUpAt: new Date().toISOString(), data: obj }));
    } catch (e) {}
  }, [data, coupleId]);

  // mark reminders as done once their time passes (no in-app pop-up)
  useEffect(() => {
    if (!data || !data.reminders || !data.reminders.length) return;
    const nowMs = Date.now();
    const due = data.reminders.filter((r) => !r.fired && new Date(r.at).getTime() <= nowMs);
    if (!due.length) return;
    setData((d) => ({ ...d, reminders: d.reminders.map((r) => due.find((x) => x.id === r.id) ? { ...r, fired: true } : r) }));
  }, [now]);

  // keep rolling chat history to the last 7 days only
  useEffect(() => {
    if (!data) return;
    const cleaned = cleanChatMessages(data.chatMessages || []);
    if (!sameChatMessages(cleaned, data.chatMessages || [])) {
      setData((d) => ({ ...d, chatMessages: cleanChatMessages(d.chatMessages || []) }));
    }
  }, [data && data.chatMessages, todayISO]);

  // auto-remove expired timed letters (text + photo), and strip photos from sealed
  // letters once their grace window has passed — keeping the shared doc small
  useEffect(() => {
    if (!data) return;
    const cleaned = cleanLetters(data.letters || []);
    if (!sameLetters(cleaned, data.letters || [])) {
      setData((d) => ({ ...d, letters: cleanLetters(d.letters || []) }));
    }
  }, [data && data.letters, todayISO]);

  // schedule phone pushes (ntfy) for upcoming timed events & reminders — fires even when app is closed
  useEffect(() => {
    if (!data || !data.ntfyOn || !data.ntfyTopic) return;
    const nowMs = Date.now();
    const maxMs = nowMs + 3 * 864e5; // ntfy.sh allows scheduling up to 3 days ahead
    const toSend = [];
    let changed = false;
    const events = data.events.map((e) => {
      if (!e.at) return e;
      const fireAt = new Date(e.at).getTime() - (e.notifyMin || 0) * 60000;
      if (!isNaN(fireAt) && fireAt > nowMs + 20000 && fireAt <= maxMs && e.ntfySched !== fireAt) {
        toSend.push({ fireAt, msg: "🗓️ " + e.title + (e.time ? " · " + e.time : "") });
        changed = true;
        return { ...e, ntfySched: fireAt };
      }
      return e;
    });
    const reminders = data.reminders.map((r) => {
      if (r.fired || !r.at) return r;
      const fireAt = new Date(r.at).getTime();
      if (!isNaN(fireAt) && fireAt > nowMs + 20000 && fireAt <= maxMs && r.ntfySched !== fireAt) {
        toSend.push({ fireAt, msg: "🔔 " + r.text });
        changed = true;
        return { ...r, ntfySched: fireAt };
      }
      return r;
    });
    if (changed) {
      toSend.forEach((s) => scheduleNtfy(data.ntfyTopic, s.fireAt, s.msg));
      setData((d) => ({ ...d, events, reminders }));
    }
  }, [data]);

                  <div key={i} className={"flex-1 rounded-2xl py-3 text-center" + (tile.hot ? " pulse-soft" : "")} style={{ background: "rgba(255,255,255,.16)", border: "1px solid rgba(255,255,255,.22)", backdropFilter: "blur(3px)" }}>
                    <div className="font-black tabular-nums leading-none" style={{ fontSize: 26, color: tile.hot ? "#FFE08A" : "#fff" }}>{pad(tile.n)}</div>
                    <div style={{ fontSize: 11, marginTop: 6, color: "rgba(255,255,255,.85)" }}>{tile.l}</div>

            )}
          </Card>
        ) : (
          <Card className="fade-up p-5 text-center" style={{ animationDelay: ".1s" }}>

              const dd = Math.max(0, Math.ceil((new Date(c.date).getTime() - now) / 86400000));

                  <span style={{ fontSize: 18 }}>{c.emoji}</span>
                  <div className="text-right"><div className="font-bold" style={{ fontSize: 13, color: C.ink }}>{c.title}</div><div style={{ fontSize: 11, color: C.muted }}>בעוד {dd.toLocaleString("he-IL")} ימים</div></div>

              <Plus style={{ width: 16, height: 16 }} /> ספירה

          </div>

        {data.longDistance && <LongDistanceCard people={data.people} names={N} now={now} />}

        {F.roulette && <RouletteCard options={data.roulette || []} onAdd={addRoulette} onDelete={delRoulette} />}

        <div className="fade-up space-y-2" style={{ animationDelay: ".18s" }}>
          {visibleLetters.length === 0 && (
            <Card className="p-6 text-center"><div className="font-bold" style={{ fontSize: 15, color: C.ink }}>אין מכתבים פתוחים כרגע 💌</div><div style={{ fontSize: 13, marginTop: 2, color: C.muted }}>כתבו מכתב חדש זה לזה למטה</div></Card>
          )}
          {visibleLetters.map((l) => {
            const locked = l.openAt && l.openAt > now;
            const accent = l.from === "b" ? "#EC4899" : "#3B82F6";
            const tint = locked ? "#F3F0FF" : (l.from === "b" ? "#FFF5F9" : "#F4F8FF");
            if (locked) return (
              <Card key={l.id} onClick={() => setOpenLetter(l.id)} className="relative p-3 pr-4 flex items-center gap-3 cursor-pointer transition hover:shadow-lg active:scale-95" style={{ background: tint, overflow: "hidden" }}>
                <span style={{ position: "absolute", top: 10, bottom: 10, right: 0, width: 4, borderRadius: 99, background: "#7C3AED" }} />
                <div className="rounded-2xl grid place-items-center shrink-0" style={{ width: 48, height: 48, background: "#EBE3FB", fontSize: 22 }}>🔒</div>
                <div className="flex-1 min-w-0 text-right">
                  <div className="font-extrabold" style={{ fontSize: 15, color: C.ink }}>מכתב חתום מ{N[l.from]}</div>
                  <div style={{ fontSize: 12.5, marginTop: 2, color: "#7C3AED" }}>נפתח ב-{new Date(l.openAt).toLocaleDateString("he-IL")} 🔒</div>

              <Card key={l.id} onClick={() => setOpenLetter(l.id)} className="relative p-3 pr-4 flex items-center gap-3 cursor-pointer transition hover:shadow-lg active:scale-95" style={{ background: tint, overflow: "hidden" }}>
                <span style={{ position: "absolute", top: 10, bottom: 10, right: 0, width: 4, borderRadius: 99, background: accent }} />
                {l.photo ? <img src={l.photo} alt="" className="rounded-2xl object-cover shrink-0" style={{ width: 48, height: 48 }} />
                  : l.hasPhoto ? <div className="rounded-2xl grid place-items-center shrink-0" style={{ width: 48, height: 48, background: `${accent}1f` }}><ImageIcon style={{ width: 20, height: 20, color: accent }} /></div>
                  : <div className="rounded-2xl grid place-items-center shrink-0" style={{ width: 48, height: 48, background: `${accent}1f` }}><Heart style={{ width: 20, height: 20, fill: accent, color: accent }} /></div>}
                <div className="flex-1 min-w-0 text-right">
                  <div className="flex items-center justify-end gap-2">
                    <span className="flex items-center gap-1" style={{ fontSize: 11, color: C.muted }}><Clock style={{ width: 12, height: 12 }} /> {timeLabel(l.createdAt)}</span>
                    <span className="font-extrabold" style={{ fontSize: 15, color: C.ink }}>מכתב מ{N[l.from]}{l.keepsake ? " ⭐" : ""}</span>
                  </div>
                  <div className="truncate" style={{ fontSize: 13, marginTop: 2, color: "#8C8593" }}>{l.text}</div>

                <div className="relative shrink-0">
                  <div className="rounded-full grid place-items-center" style={{ width: 38, height: 38, background: `${accent}1a` }}><Heart style={{ width: 18, height: 18, fill: accent, color: accent }} /></div>

              </Card>
            );
          })}
          <button onClick={() => setModal("letter")} className="w-full rounded-3xl py-3.5 flex items-center justify-center gap-2 text-white font-extrabold transition active:scale-95" style={{ fontSize: 15, background: `linear-gradient(95deg, ${meColor}, #F472B6)`, boxShadow: `0 14px 28px -14px ${meColor}` }}>

            <div className="grid grid-cols-3 gap-2">
              {keepsakes.map((l) => {

                  </button>

        <Section icon={<Cloud style={{ width: 22, height: 22, color: "#60A5FA" }} />} iconBg="#EAF2FF" title="רשימת החלומות שלנו" badge={`${pendingDreams} ממתינים`} badgeColor="#3B82F6" open={open.dreams} onToggle={() => toggle("dreams")}>

            <div className="font-black" style={{ fontSize: 22, color: C.ink }}>{MONTHS[m]} {y}</div>

              <RoundBtn onClick={() => setCal((c) => c.m === 0 ? { y: c.y - 1, m: 11 } : { y: c.y, m: c.m - 1 })} className="w-9 h-9" style={{ background: "#F6EEF2" }}><ChevronRight style={{ width: 20, height: 20, color: C.ink }} /></RoundBtn>

            </div>
          </div>
          <div className="grid grid-cols-7 mb-1">{DOW.map((d) => <div key={d} className="text-center font-bold py-1.5" style={{ fontSize: 12, color: C.muted }}>{d}</div>)}</div>
          <div className="grid grid-cols-7 gap-1">
            {cells.map((d, i) => {
              if (d === null) return <div key={i} className="rounded-xl" style={{ background: "#F7F1F4", minHeight: 58 }} />;
              const dISO = iso(y, m, d); const evs = eventsByDate[dISO] || []; const isToday = dISO === todayISO; const isSel = dISO === selectedDate;
              return (
                <button key={i} onClick={() => setSelectedDate(dISO)} className="rounded-xl p-1 flex flex-col items-center gap-0.5 transition" style={{ minHeight: 58, background: "#fff", outline: isSel ? "2px solid #F472B6" : `1px solid ${C.line}`, outlineOffset: -1 }}>

                  <div className="w-full flex flex-col gap-0.5">
                    {evs.slice(0, 2).map((e) => <div key={e.id} className="rounded text-white px-1 truncate leading-tight" style={{ fontSize: 9, paddingTop: 1, paddingBottom: 1, background: CATS[e.cat].bg }}>{e.title}</div>)}
                    {evs.length > 2 && <div className="text-center font-bold" style={{ fontSize: 8.5, color: C.muted }}>+{evs.length - 2} נוספים</div>}

        </Card>

        <Card className="fade-up overflow-hidden" style={{ animationDelay: ".3s" }}>
          <div className="p-4" style={{ background: "linear-gradient(95deg,#F3EEFF,#FCEFF6)" }}>
            <div className="text-right font-extrabold" style={{ fontSize: 19, color: C.ink }}>תוכניות ל־{selDay} ב{MONTHS[selMonthIdx]}</div>
            <div className="text-right" style={{ fontSize: 13, marginTop: 2, color: C.muted }}>{dayEvents.length ? `${dayEvents.length} ${dayEvents.length === 1 ? "אירוע" : "אירועים"}` : (selectedDate === todayISO ? "אין תוכניות להיום 😉" : "אין אירועים ליום זה")}</div>
          </div>
          <div className="p-3">
            {dayEvents.length === 0 ? (
              <div className="py-10 text-center">
                <div className="grid place-items-center mx-auto mb-3 rounded-full" style={{ width: 64, height: 64, background: "#F4EEF1" }}><Calendar style={{ width: 28, height: 28, color: "#C9B6C0" }} /></div>
                <div className="font-bold" style={{ fontSize: 16, color: "#7C8595" }}>אין תוכניות ליום זה</div>
                <div style={{ fontSize: 13, marginTop: 2, color: C.muted }}>תוכלו להוסיף תוכנית חדשה למטה</div>
              </div>
            ) : (
              <div className="space-y-2 mb-3">
                {dayEvents.map((e) => (
                  <div key={e.id} className="flex items-center gap-3 rounded-2xl p-3" style={{ background: C.soft }}>
                    <span className="rounded-full shrink-0" style={{ width: 10, height: 36, background: CATS[e.cat].bg }} />
                    <div className="flex-1 text-right">
                      <div className="font-bold flex items-center justify-end gap-1.5" style={{ fontSize: 15, color: C.ink }}>{e.title}{e.time ? <span style={{ fontSize: 12 }}>🔔</span> : null}</div>
                      <div style={{ fontSize: 12, color: C.muted }}>{e.time ? `${e.time} · ` : ""}{CATS[e.cat].label}</div>
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                      <button onClick={() => delEvent(e.id)}><Trash2 style={{ width: 16, height: 16, color: "#E0719A" }} /></button>
                    </div>
                  </div>
                ))}
              </div>
            )}
            <button onClick={() => setModal("event")} className="w-full rounded-3xl py-4 flex items-center justify-center gap-2 text-white font-extrabold transition active:scale-95" style={{ fontSize: 16, background: T.cta, boxShadow: `0 14px 30px -16px ${T.swatch}` }}>
              <Plus style={{ width: 20, height: 20 }} /> הוספת אירוע ליום זה
            </button>
          </div>
        </Card>

        {F.reminders && (
        <Section icon={<Bell style={{ width: 22, height: 22, color: "#F59E0B" }} />} iconBg="#FDF3DC" title="תזכורות" badge={data.reminders.filter((r) => !r.fired).length || null} badgeColor="#F59E0B" open={open.reminders} onToggle={() => toggle("reminders")}>
          <button onClick={() => setModal("reminder")} className="w-full rounded-2xl py-3 flex items-center justify-center gap-2 text-white font-bold transition active:scale-95" style={{ fontSize: 14, background: "linear-gradient(95deg,#F59E0B,#EC4899)" }}><Plus style={{ width: 18, height: 18 }} /> תזכורת חדשה</button>
          {data.reminders.length === 0 ? <div className="text-center py-2" style={{ fontSize: 12.5, color: C.muted }}>אין תזכורות. שימו לב: התראות עובדות בזמן שהאפליקציה פתוחה.</div> :
            [...data.reminders].sort((a, b) => new Date(a.at) - new Date(b.at)).map((r) => (
              <div key={r.id} className="flex items-center gap-3 rounded-2xl px-3 py-2.5" style={{ background: C.soft, opacity: r.fired ? 0.6 : 1 }}>
                <Bell style={{ width: 16, height: 16, color: r.fired ? C.muted : "#F59E0B" }} />
                <div className="flex-1 text-right"><div className="font-bold" style={{ fontSize: 14, color: C.ink, textDecoration: r.fired ? "line-through" : "none" }}>{r.text}</div>
                  <div style={{ fontSize: 11, color: C.muted }}>{new Date(r.at).toLocaleString("he-IL", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" })}{r.fired ? " · בוצע" : ""}</div></div>
                <div className="flex items-center gap-2 shrink-0">
                  <button onClick={() => delReminder(r.id)}><Trash2 style={{ width: 16, height: 16, color: "#E0719A" }} /></button>
                </div>
              </div>
            ))}
        </Section>
        )}

        <div className="text-center pt-1" style={{ fontFamily: SCRIPT, fontSize: 15, color: "#C58AA0" }}>נוצר באהבה • {coupleTitle} ❤️</div>
        <div className="text-center" style={{ fontSize: 10, color: "#D8B9C6", marginTop: 2 }}>v21</div>

        <div className="flex flex-col items-center gap-1.5 pt-2">
          {user && user.email && <span style={{ fontSize: 11, color: C.muted, direction: "ltr" }}>{user.email}</span>}
          <button onClick={doSignOut} className="flex items-center gap-1.5 rounded-full px-4 py-2 font-bold transition active:scale-95" style={{ fontSize: 12.5, color: "#EF4444", background: "#FDECEC" }}>
            <LogOut style={{ width: 14, height: 14 }} /> התנתקות
          </button>
        </div>
      </div>

      {openLetter && (() => {
        const l = data.letters.find((x) => x.id === openLetter);
        if (!l) return null;
        return <LetterViewer letter={l} names={N} now={now} coupleId={coupleId} onReact={(e) => reactLetter(l.id, e)} onKeepsake={() => keepsakeLetter(l.id)} onDelete={() => delLetter(l.id)} onClose={() => setOpenLetter(null)} />;
      })()}
      {modal === "letter" && (<Modal onClose={() => setModal(null)} accent={meColor}><WriteLetterForm from={me} names={N} onSave={addLetter} onClose={() => setModal(null)} /></Modal>)}
      {modal === "event" && (<Modal onClose={() => setModal(null)} accent="#7C3AED"><EventForm presetDate={selectedDate} onSave={addEvent} onClose={() => setModal(null)} /></Modal>)}
      {modal === "countdown" && (<Modal onClose={() => { setModal(null); setCdTarget(null); }} accent="#F97316"><CountdownForm current={cdTarget} names={N} defaultBy={me} onSave={saveCountdown} onDelete={delCountdown} onClose={() => { setModal(null); setCdTarget(null); }} /></Modal>)}
      {modal === "reminder" && (<Modal onClose={() => setModal(null)} accent="#F59E0B"><ReminderForm onSave={addReminder} onClose={() => setModal(null)} /></Modal>)}
      {modal === "settings" && (<Modal onClose={() => setModal(null)} accent="#EC4899"><SettingsForm names={data.names} anniversary={data.anniversary} theme={data.theme} longDistance={data.longDistance} people={data.people} features={data.features} ntfyOn={data.ntfyOn} ntfyTopic={data.ntfyTopic} coupleId={coupleId} onTestNtfy={(t) => sendNtfy(t, "🔔 התראת בדיקה — אם קיבלת את זה, הכול עובד!")} onExportBackup={exportBackup} email={user.email} onResetPassword={doResetPassword} onSave={saveSettings} onClose={() => setModal(null)} /></Modal>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
/* Build the app icon (sunset journal + heart) on a canvas, then wire up
   favicon, apple-touch-icon and a web app manifest — all inline, no extra files. */
(function () {
  function roundRect(x, a, b, w, h, r) { x.beginPath(); x.moveTo(a + r, b); x.arcTo(a + w, b, a + w, b + h, r); x.arcTo(a + w, b + h, a, b + h, r); x.arcTo(a, b + h, a, b, r); x.arcTo(a, b, a + w, b, r); x.closePath(); }
  function heart(x, cx, cy, s, color) { x.save(); x.translate(cx, cy); x.scale(s / 32, s / 32); x.beginPath(); x.moveTo(0, 10); x.bezierCurveTo(-14, -4, -10, -20, 0, -10); x.bezierCurveTo(10, -20, 14, -4, 0, 10); x.closePath(); x.fillStyle = color; x.fill(); x.restore(); }
  function makeIcon(S) {
    var c = document.createElement("canvas"); c.width = c.height = S; var x = c.getContext("2d");
    var g = x.createLinearGradient(0, 0, S, S); g.addColorStop(0, "#FF9F5A"); g.addColorStop(.55, "#FB6F7F"); g.addColorStop(1, "#EE4F6E");
    roundRect(x, 0, 0, S, S, S * 0.22); x.fillStyle = g; x.fill();
    x.save(); x.translate(S * 0.5, S * 0.52); x.rotate(-0.05);
    var bw = S * 0.46, bh = S * 0.56;
    x.shadowColor = "rgba(120,20,40,.30)"; x.shadowBlur = S * 0.05; x.shadowOffsetY = S * 0.02;
    roundRect(x, -bw / 2, -bh / 2, bw, bh, S * 0.07); x.fillStyle = "#FFFFFF"; x.fill();
    x.shadowColor = "transparent";
    roundRect(x, -bw / 2, -bh / 2, S * 0.11, bh, S * 0.055); x.fillStyle = "#F7C9DB"; x.fill();
    heart(x, S * 0.03, 0, S * 0.30, "#EC4899");
    x.restore();
    return c.toDataURL("image/png");
  }
  function setLink(rel, href, sizes) {
    var l = document.createElement("link"); l.rel = rel; l.href = href; if (sizes) l.setAttribute("sizes", sizes);
    document.head.appendChild(l);
  }
  try {
    var i192 = makeIcon(192), i512 = makeIcon(512);
    setLink("icon", i192, "192x192");
    setLink("apple-touch-icon", i192);
    var startUrl = location.href.split("#")[0].split("?")[0];
    var scope = startUrl.replace(/[^/]*$/, "");
    var manifest = {
      name: "היומן של אסף וליאל", short_name: "היומן שלנו",
      description: "היומן הזוגי שלנו", start_url: startUrl, scope: scope,
      display: "standalone", orientation: "portrait",
      background_color: "#FDF1F4", theme_color: "#EE4F6E", lang: "he", dir: "rtl",
      icons: [
        { src: i192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
        { src: i512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
      ]
    };
    var blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    setLink("manifest", URL.createObjectURL(blob));
  } catch (e) { console.error("icon/manifest setup failed", e); }
})();
</script>
